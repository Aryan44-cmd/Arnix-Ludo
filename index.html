<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Arnix Ludo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}

.screen{
  width:100%;height:100vh;
  position:relative;overflow:hidden;
}

.bg{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  background-image:url('background.png');
  background-size:cover;background-position:center;
  z-index:0;
}

/* Logo - top fixed */
.logo-area{
  position:absolute;
  top:2vh;   /* Pehle 6vh tha */
  left:50%;
  transform:translateX(-50%);
  z-index:10;
}
@keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

.logo-img{
  width:45vw;max-width:200px;
  display:block;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,0.15));
  animation:logoPulse 2.5s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

/* Dice - exact center */
.hero-area{
  position:absolute;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;
  display:flex;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.9s ease 0.3s both;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.hero-img{
  width:280px;
  max-width:80vw;
  display:block;
  filter:drop-shadow(0 12px 30px rgba(0,0,0,0.12));
  animation:heroFloat 3s ease-in-out infinite;
}
@keyframes heroFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

/* Progress - bottom fixed */
.progress-area{
  position:absolute;
  bottom:12%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  z-index:2;
  animation:fadeUp 0.9s ease 0.5s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

.progress-pct{
  font-size:1rem;font-weight:700;
  color:#fff;font-family:sans-serif;
  text-align:center;margin-bottom:8px;
  text-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.progress-track{
  height:50px;
  background:rgba(173,216,230,0.5);
  border-radius:99px;overflow:hidden;
  border:3px solid rgba(255,255,255,0.9);
  box-shadow:0 0 0 5px rgba(255,255,255,0.4),0 8px 24px rgba(0,0,0,0.12);
  padding:5px;
}

.progress-fill{
  height:100%;width:0%;
  border-radius:99px;
  background:linear-gradient(90deg,#29B6F6,#4FC3F7,#81D4FA);
  transition:width 0.12s linear;
  box-shadow:0 0 20px rgba(41,182,246,0.6);
  position:relative;overflow:hidden;
}
.progress-fill::after{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
  animation:barShimmer 1.2s linear infinite;
}
@keyframes barShimmer{0%{left:-60%;}100%{left:160%;}}

.loading-text{
  text-align:center;margin-top:10px;
  font-size:0.88rem;font-weight:500;font-family:sans-serif;
  color:rgba(255,255,255,0.9);
  text-shadow:0 1px 4px rgba(0,0,0,0.15);
}
</style>
</head>
<body>
<div class="screen">
  <div class="bg"></div>

  <!-- Logo TOP -->
  <div class="logo-area">
    <img class="logo-img" src="logo.png" alt="Arnix Ludo"/>
  </div>

  <!-- Dice EXACT CENTER -->
  <div class="hero-area">
    <img class="hero-img" src="dice.png" alt="Dice"/>
  </div>

  <!-- Progress BOTTOM -->
  <div class="progress-area">
    <div class="progress-pct" id="pct">0%</div>
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
    </div>
    <div class="loading-text" id="msg">Preparing your game...</div>
  </div>
</div>

<script>
let p=0;
const fill=document.getElementById('fill');
const pct=document.getElementById('pct');
const msg=document.getElementById('msg');
const msgs=['Preparing your game...','Loading assets...','Almost ready...','Let\'s play! 🎲'];
let mi=0;
const iv=setInterval(()=>{
  p+=Math.random()*2+0.8;
  if(p>=100){p=100;clearInterval(iv);msg.textContent=msgs[3];setTimeout(()=>{window.location.href='menu.html';},700);}
  fill.style.width=p+'%';
  pct.textContent=Math.floor(p)+'%';
  if(p>30&&mi===0){mi=1;msg.textContent=msgs[1];}
  if(p>65&&mi===1){mi=2;msg.textContent=msgs[2];}
  if(p>90&&mi===2){mi=3;msg.textContent=msgs[3];}
},65);
</script>
</body>
</html>
